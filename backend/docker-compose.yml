version: '3.8'

services:
  # Redis 缓存和消息队列
  redis:
    image: redis:7-alpine
    container_name: novel_rag_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - novel_rag_network

  # Qdrant 向量数据库
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: novel_rag_qdrant
    ports:
      - "6333:6333"  # HTTP API
      - "6334:6334"  # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - novel_rag_network

volumes:
  redis_data:
  qdrant_data:

networks:
  novel_rag_network:
    driver: bridge