[pytest]
# Pytest 配置文件

# 测试目录
testpaths = tests

# Python 文件和函数识别模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 输出选项
addopts = 
    -v                          # 详细输出
    --tb=short                  # 简短的traceback
    --strict-markers            # 严格的marker模式
    --cov=app                   # 代码覆盖率（针对app目录）
    --cov-report=term-missing   # 显示未覆盖的行
    --cov-report=html           # 生成HTML覆盖率报告
    --cov-report=xml            # 生成XML覆盖率报告
    --asyncio-mode=auto         # 自动检测异步测试

# 测试标记定义
markers =
    unit: 单元测试（快速，不依赖外部服务）
    integration: 集成测试（需要数据库等服务）
    e2e: 端到端测试（完整流程测试）
    slow: 慢速测试（需要较长时间）
    external: 需要外部服务（如智谱AI）
    skip_ci: 在CI环境中跳过

# 日志配置
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 覆盖率配置
[coverage:run]
source = app
omit = 
    */tests/*
    */migrations/*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

