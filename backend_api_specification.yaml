openapi: 3.0.3
info:
  title: 小说 RAG 分析系统 API
  description: |
    # 小说 RAG 分析系统后端 API 规范
    
    ## 系统概述
    
    本 API 为小说 RAG 分析系统提供后端服务，支持中文长篇小说的智能检索、问答和关系分析功能。
    
    ## 核心功能
    
    - 📚 **小说管理**：上传、存储、管理中文 TXT 小说
    - 🔍 **智能检索**：基于 RAG 技术的语义搜索和问答
    - 🎨 **关系分析**：自动提取人物关系并生成图谱
    - 📖 **章节处理**：自动识别和管理章节结构
    - 📊 **统计分析**：提供数据统计和分析功能
    
    ## 技术要求
    
    ### 数据格式要求
    
    - **文件格式**：仅支持 TXT 纯文本格式
    - **编码格式**：UTF-8、GBK、GB2312
    - **语言要求**：仅支持中文小说
    - **文件大小**：支持最大 50MB 单文件（约 300 万字）
    
    ### 数据校验规则
    
    后端在接收数据时会进行严格校验：
    
    1. **文件格式验证**：检查文件扩展名和 MIME 类型
    2. **编码检测**：自动检测并验证文本编码
    3. **内容验证**：
       - 检查是否为有效的文本内容
       - 验证中文字符占比（至少 60%）
       - 检测并拒绝非小说内容（如代码、日志等）
    4. **大小限制**：单文件不超过 50MB
    5. **字数统计**：自动统计并验证字数（最少 1000 字）
    
    ## 认证机制
    
    API 使用 JWT（JSON Web Token）进行身份认证：
    
    - 客户端登录后获取 JWT Token
    - 后续请求在 Header 中携带：`Authorization: Bearer <token>`
    - Token 有效期：7 天（可刷新）
    
    ## 错误处理
    
    API 使用标准 HTTP 状态码，错误响应统一格式：
    
    ```json
    {
      "error": {
        "code": "ERROR_CODE",
        "message": "错误描述信息",
        "details": "详细错误信息（可选）"
      }
    }
    ```
    
    ## 速率限制
    
    - 普通接口：100 次/分钟
    - 文件上传：10 次/分钟
    - RAG 问答：20 次/分钟
    - 关系图谱生成：5 次/分钟
    
  version: 1.0.0
  contact:
    name: API 支持
    email: support@novel-rag.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://api.novel-rag.com/v1
    description: 生产环境
  - url: https://staging-api.novel-rag.com/v1
    description: 测试环境
  - url: http://localhost:8000/v1
    description: 本地开发环境

tags:
  - name: 认证
    description: 用户认证和授权相关接口
  - name: 小说管理
    description: 小说的增删改查操作
  - name: 章节管理
    description: 章节识别和管理
  - name: 文本处理
    description: 文本上传、编码检测、向量化等处理
  - name: RAG 搜索
    description: 智能搜索和问答功能
  - name: 关系图谱
    description: 人物关系提取和图谱生成
  - name: 统计信息
    description: 数据统计和分析
  - name: 系统管理
    description: 系统健康检查和配置

paths:
  # ==================== 认证相关 ====================
  /auth/register:
    post:
      tags:
        - 认证
      summary: 用户注册
      description: 创建新用户账号
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - email
                - password
              properties:
                username:
                  type: string
                  minLength: 3
                  maxLength: 30
                  description: 用户名
                  example: "novel_reader"
                email:
                  type: string
                  format: email
                  description: 邮箱地址
                  example: "user@example.com"
                password:
                  type: string
                  minLength: 8
                  format: password
                  description: 密码（至少 8 位）
                  example: "SecurePass123!"
      responses:
        '201':
          description: 注册成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "注册成功"
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: 用户已存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      tags:
        - 认证
      summary: 用户登录
      description: 使用用户名/邮箱和密码登录
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - identifier
                - password
              properties:
                identifier:
                  type: string
                  description: 用户名或邮箱
                  example: "novel_reader"
                password:
                  type: string
                  format: password
                  description: 密码
                  example: "SecurePass123!"
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "登录成功"
                  token:
                    type: string
                    description: JWT 访问令牌
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  refreshToken:
                    type: string
                    description: 刷新令牌
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags:
        - 认证
      summary: 刷新访问令牌
      description: 使用刷新令牌获取新的访问令牌
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
                  description: 刷新令牌
      responses:
        '200':
          description: 刷新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: 新的访问令牌
                  refreshToken:
                    type: string
                    description: 新的刷新令牌
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags:
        - 认证
      summary: 用户登出
      description: 登出并使当前令牌失效
      operationId: logoutUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 登出成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "登出成功"
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ==================== 小说管理 ====================
  /novels:
    get:
      tags:
        - 小说管理
      summary: 获取小说列表
      description: 获取当前用户的所有小说，支持分页和筛选
      operationId: getNovels
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          description: 页码（从 1 开始）
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          description: 每页数量
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: sortBy
          in: query
          description: 排序字段
          schema:
            type: string
            enum: [title, author, importedAt, wordCount]
            default: importedAt
        - name: sortOrder
          in: query
          description: 排序方向
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: search
          in: query
          description: 搜索关键词（书名或作者）
          schema:
            type: string
        - name: tags
          in: query
          description: 标签筛选（逗号分隔）
          schema:
            type: string
            example: "玄幻,修仙"
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Novel'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags:
        - 小说管理
      summary: 创建小说记录
      description: |
        创建小说元数据记录（不包含文件上传）
        
        注意：实际的文本内容需要通过 `/novels/{novelId}/upload` 接口上传
      operationId: createNovel
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
              properties:
                title:
                  type: string
                  minLength: 1
                  maxLength: 200
                  description: 小说标题
                  example: "斗破苍穹"
                author:
                  type: string
                  maxLength: 100
                  description: 作者名
                  example: "天蚕土豆"
                description:
                  type: string
                  maxLength: 2000
                  description: 小说简介
                  example: "这是一部玄幻小说..."
                tags:
                  type: array
                  items:
                    type: string
                  maxItems: 10
                  description: 标签列表
                  example: ["玄幻", "修仙", "热血"]
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "小说创建成功"
                  novel:
                    $ref: '#/components/schemas/Novel'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /novels/{novelId}:
    get:
      tags:
        - 小说管理
      summary: 获取小说详情
      description: 获取指定小说的详细信息（包含章节列表）
      operationId: getNovelById
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/NovelIdParam'
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NovelDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - 小说管理
      summary: 更新小说信息
      description: 更新小说的元数据（不包含内容）
      operationId: updateNovel
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/NovelIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  minLength: 1
                  maxLength: 200
                  description: 小说标题
                author:
                  type: string
                  maxLength: 100
                  description: 作者名
                description:
                  type: string
                  maxLength: 2000
                  description: 小说简介
                tags:
                  type: array
                  items:
                    type: string
                  maxItems: 10
                  description: 标签列表
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "更新成功"
                  novel:
                    $ref: '#/components/schemas/Novel'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - 小说管理
      summary: 删除小说
      description: |
        删除指定小说及其所有相关数据
        
        注意：此操作不可逆，将删除：
        - 小说文本内容
        - 章节数据
        - 向量索引
        - 关系图谱
        - 搜索历史
      operationId: deleteNovel
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/NovelIdParam'
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "删除成功"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==================== 文本处理 ====================
  /novels/{novelId}/upload:
    post:
      tags:
        - 文本处理
      summary: 上传小说文本文件
      description: |
        上传 TXT 格式的小说文本文件
        
        处理流程：
        1. 文件格式和大小验证
        2. 编码检测和转换
        3. 内容验证（中文占比、字数等）
        4. 章节自动识别
        5. 文本向量化和索引构建
        
        注意：
        - 支持的编码：UTF-8、GBK、GB2312
        - 最大文件大小：50MB
        - 处理时间取决于文件大小，可能需要几分钟
      operationId: uploadNovelFile
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/NovelIdParam'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: TXT 文件
                autoDetectChapters:
                  type: boolean
                  default: true
                  description: 是否自动识别章节
                chapterPattern:
                  type: string
                  description: |
                    自定义章节识别正则表达式（可选）
                    
                    默认支持：
                    - 第X章
                    - 第X回
                    - Chapter X
                  example: "第[\\d]+章"
      responses:
        '202':
          description: 上传成功，处理中
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "文件上传成功，正在处理中"
                  taskId:
                    type: string
                    description: 异步任务 ID，用于查询处理状态
                    example: "task_abc123"
                  estimatedTime:
                    type: integer
                    description: 预计处理时间（秒）
                    example: 120
        '400':
          description: 文件验证失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalidFormat:
                  value:
                    error:
                      code: "INVALID_FILE_FORMAT"
                      message: "文件格式不正确，仅支持 TXT 格式"
                fileTooLarge:
                  value:
                    error:
                      code: "FILE_TOO_LARGE"
                      message: "文件大小超过限制（最大 50MB）"
                invalidEncoding:
                  value:
                    error:
                      code: "INVALID_ENCODING"
                      message: "无法识别文件编码，请确保使用 UTF-8、GBK 或 GB2312"
                notChineseNovel:
                  value:
                    error:
                      code: "INVALID_CONTENT"
                      message: "文件内容不符合要求，中文字符占比过低"
                tooShort:
                  value:
                    error:
                      code: "CONTENT_TOO_SHORT"
                      message: "文本内容过短，至少需要 1000 字"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '413':
          description: 文件过大
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /tasks/{taskId}/status:
    get:
      tags:
        - 文本处理
      summary: 查询异步任务状态
      description: 查询文件上传处理等异步任务的状态
      operationId: getTaskStatus
      security:
        - bearerAuth: []
      parameters:
        - name: taskId
          in: path
          required: true
          description: 任务 ID
          schema:
            type: string
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  taskId:
                    type: string
                    example: "task_abc123"
                  status:
                    type: string
                    enum: [pending, processing, completed, failed]
                    description: |
                      任务状态：
                      - pending: 等待处理
                      - processing: 处理中
                      - completed: 完成
                      - failed: 失败
                    example: "processing"
                  progress:
                    type: integer
                    minimum: 0
                    maximum: 100
                    description: 处理进度（百分比）
                    example: 45
                  message:
                    type: string
                    description: 当前状态描述
                    example: "正在识别章节结构..."
                  result:
                    type: object
                    description: 任务完成后的结果（仅当 status=completed）
                    properties:
                      novelId:
                        type: string
                      wordCount:
                        type: integer
                      chapterCount:
                        type: integer
                      processingTime:
                        type: number
                        description: 处理耗时（秒）
                  error:
                    type: object
                    description: 错误信息（仅当 status=failed）
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                  createdAt:
                    type: string
                    format: date-time
                  updatedAt:
                    type: string
                    format: date-time
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /novels/{novelId}/validate:
    post:
      tags:
        - 文本处理
      summary: 验证小说文本
      description: |
        验证小说文本是否符合处理要求（不实际上传）
        
        用于前端预检查，快速反馈文件是否合格
      operationId: validateNovelFile
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/NovelIdParam'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: 验证结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                    description: 是否有效
                  encoding:
                    type: string
                    description: 检测到的编码
                    example: "UTF-8"
                  wordCount:
                    type: integer
                    description: 字数统计
                    example: 1250000
                  chineseRatio:
                    type: number
                    description: 中文字符占比
                    example: 0.92
                  estimatedChapters:
                    type: integer
                    description: 预估章节数
                    example: 450
                  warnings:
                    type: array
                    items:
                      type: string
                    description: 警告信息
                    example: ["检测到部分非标准章节标题"]
                  errors:
                    type: array
                    items:
                      type: string
                    description: 错误信息
                    example: []
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==================== 章节管理 ====================
  /novels/{novelId}/chapters:
    get:
      tags:
        - 章节管理
      summary: 获取章节列表
      description: 获取指定小说的所有章节
      operationId: getChapters
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/NovelIdParam'
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Chapter'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags:
        - 章节管理
      summary: 手动添加章节
      description: 手动创建章节划分（用于自动识别不准确的情况）
      operationId: createChapter
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/NovelIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - startPosition
                - endPosition
              properties:
                title:
                  type: string
                  description: 章节标题
                  example: "第一章 初入江湖"
                chapterNumber:
                  type: integer
                  description: 章节序号
                  example: 1
                startPosition:
                  type: integer
                  description: 起始位置（字符索引）
                  example: 0
                endPosition:
                  type: integer
                  description: 结束位置（字符索引）
                  example: 5230
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "章节创建成功"
                  chapter:
                    $ref: '#/components/schemas/Chapter'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /novels/{novelId}/chapters/{chapterId}:
    get:
      tags:
        - 章节管理
      summary: 获取章节内容
      description: 获取指定章节的完整内容
      operationId: getChapterContent
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/NovelIdParam'
        - name: chapterId
          in: path
          required: true
          description: 章节 ID
          schema:
            type: string
      responses:
        '200':
