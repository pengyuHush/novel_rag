# ==================== 组件定义 ====================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT 访问令牌

  parameters:
    NovelIdParam:
      name: novelId
      in: path
      required: true
      description: 小说 ID
      schema:
        type: string
        example: "novel_abc123"

  schemas:
    # 用户
    User:
      type: object
      properties:
        id:
          type: string
          example: "user_123"
        username:
          type: string
          example: "novel_reader"
        email:
          type: string
          format: email
          example: "user@example.com"
        createdAt:
          type: string
          format: date-time
        storageUsed:
          type: integer
          description: 已使用存储空间（字节）
        storageLimit:
          type: integer
          description: 存储空间限制（字节）

    # 小说
    Novel:
      type: object
      properties:
        id:
          type: string
          example: "novel_abc123"
        title:
          type: string
          example: "斗破苍穹"
        author:
          type: string
          example: "天蚕土豆"
        description:
          type: string
          example: "这是一部玄幻小说..."
        tags:
          type: array
          items:
            type: string
          example: ["玄幻", "修仙", "热血"]
        wordCount:
          type: integer
          description: 总字数
          example: 1250000
        chapterCount:
          type: integer
          description: 章节数
          example: 450
        status:
          type: string
          enum: [pending, processing, completed, failed]
          description: |
            处理状态：
            - pending: 等待处理
            - processing: 处理中
            - completed: 完成
            - failed: 失败
          example: "completed"
        importedAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        hasGraph:
          type: boolean
          description: 是否已生成关系图谱
          example: true

    # 小说详情
    NovelDetail:
      allOf:
        - $ref: '#/components/schemas/Novel'
        - type: object
          properties:
            chapters:
              type: array
              items:
                $ref: '#/components/schemas/Chapter'
            encoding:
              type: string
              description: 文件编码
              example: "UTF-8"
            fileSize:
              type: integer
              description: 文件大小（字节）
            chineseRatio:
              type: number
              description: 中文字符占比
              example: 0.92

    # 章节
    Chapter:
      type: object
      properties:
        id:
          type: string
          example: "chapter_123"
        novelId:
          type: string
          example: "novel_abc123"
        chapterNumber:
          type: integer
          description: 章节序号
          example: 1
        title:
          type: string
          description: 章节标题
          example: "第一章 初入江湖"
        startPosition:
          type: integer
          description: 起始位置（字符索引）
          example: 0
        endPosition:
          type: integer
          description: 结束位置（字符索引）
          example: 5230
        wordCount:
          type: integer
          description: 章节字数
          example: 5230

    # 搜索引用
    SearchReference:
      type: object
      properties:
        novelId:
          type: string
          description: 来源小说 ID
        novelTitle:
          type: string
          description: 来源小说标题
          example: "斗破苍穹"
        chapterId:
          type: string
          description: 来源章节 ID
        chapterTitle:
          type: string
          description: 来源章节标题
          example: "第十五章 拜师"
        chapterNumber:
          type: integer
          description: 章节序号
          example: 15
        paragraphIndex:
          type: integer
          description: 段落索引
          example: 3
        content:
          type: string
          description: 原文内容片段
          example: "\"老师，徒儿拜见！\" 萧炎恭恭敬敬地对着药尘行了一礼。"
        relevanceScore:
          type: number
          minimum: 0
          maximum: 1
          description: 相关度评分
          example: 0.89
        startPosition:
          type: integer
          description: 段落在章节中的起始位置
        highlightText:
          type: string
          description: 高亮文本（关键匹配部分）
          example: "药尘"

    # 搜索历史
    SearchHistory:
      type: object
      properties:
        id:
          type: string
          example: "history_123"
        query:
          type: string
          description: 搜索问题
          example: "萧炎的师父是谁？"
        answer:
          type: string
          description: 答案摘要
          example: "萧炎的师父是药尘..."
        novelIds:
          type: array
          items:
            type: string
          description: 搜索范围小说 ID
        resultCount:
          type: integer
          description: 结果数量
          example: 5
        searchedAt:
          type: string
          format: date-time

    # 人物关系图谱
    CharacterGraph:
      type: object
      properties:
        id:
          type: string
          example: "graph_123"
        novelId:
          type: string
          example: "novel_abc123"
        characters:
          type: array
          items:
            $ref: '#/components/schemas/Character'
        relationships:
          type: array
          items:
            $ref: '#/components/schemas/Relationship'
        generatedAt:
          type: string
          format: date-time
        version:
          type: string
          description: 图谱版本
          example: "1.0"

    # 人物
    Character:
      type: object
      properties:
        id:
          type: string
          example: "char_123"
        name:
          type: string
          description: 人物姓名
          example: "萧炎"
        aliases:
          type: array
          items:
            type: string
          description: 别名/称号
          example: ["炎帝", "萧门门主"]
        role:
          type: string
          description: 角色类型
          enum: [protagonist, antagonist, supporting, minor]
          example: "protagonist"
        description:
          type: string
          description: 人物描述
          example: "主角，修炼斗气，逆天崛起..."
        appearances:
          type: integer
          description: 出场次数
          example: 856
        importance:
          type: number
          minimum: 0
          maximum: 1
          description: 重要程度（0-1）
          example: 1.0
        firstAppearance:
          type: object
          properties:
            chapterId:
              type: string
            chapterTitle:
              type: string
          description: 首次出场
        attributes:
          type: object
          description: 人物属性（自由扩展）
          additionalProperties: true
          example:
            gender: "男"
            faction: "萧家"
            level: "斗帝"

    # 关系
    Relationship:
      type: object
      properties:
        id:
          type: string
          example: "rel_123"
        source:
          type: string
          description: 源人物 ID
          example: "char_123"
        target:
          type: string
          description: 目标人物 ID
          example: "char_456"
        type:
          type: string
          description: 关系类型
          enum: [family, friend, enemy, master-disciple, lover, ally, rival]
          example: "master-disciple"
        description:
          type: string
          description: 关系描述
          example: "师徒关系，药尘是萧炎的师父"
        strength:
          type: number
          minimum: 0
          maximum: 10
          description: 关系强度（0-10）
          example: 9.5
        evidence:
          type: array
          items:
            type: object
            properties:
              chapterId:
                type: string
              context:
                type: string
          description: 关系证据（原文片段）

    # 分页
    Pagination:
      type: object
      properties:
        page:
          type: integer
          description: 当前页码
          example: 1
        pageSize:
          type: integer
          description: 每页数量
          example: 20
        total:
          type: integer
          description: 总记录数
          example: 156
        totalPages:
          type: integer
          description: 总页数
          example: 8

    # 错误
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: 错误代码
              example: "VALIDATION_ERROR"
            message:
              type: string
              description: 错误描述
              example: "请求参数验证失败"
            details:
              type: string
              description: 详细错误信息
              example: "title: 必填字段"
            timestamp:
              type: string
              format: date-time

  responses:
    BadRequest:
      description: 请求参数错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: "BAD_REQUEST"
              message: "请求参数错误"

    Unauthorized:
      description: 未授权或令牌无效
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: "UNAUTHORIZED"
              message: "未授权访问，请先登录"

    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: "NOT_FOUND"
              message: "请求的资源不存在"

    TooManyRequests:
      description: 请求过于频繁
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: "RATE_LIMIT_EXCEEDED"
              message: "请求过于频繁，请稍后再试"
      headers:
        X-RateLimit-Limit:
          description: 速率限制
          schema:
            type: integer
        X-RateLimit-Remaining:
          description: 剩余请求次数
          schema:
            type: integer
        X-RateLimit-Reset:
          description: 重置时间（Unix 时间戳）
          schema:
            type: integer

