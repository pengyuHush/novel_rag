  # ==================== RAG 搜索与问答 ====================
  /search:
    post:
      tags:
        - RAG 搜索
      summary: 智能搜索和问答
      description: |
        基于 RAG 技术的智能搜索和问答
        
        处理流程：
        1. 问题理解和向量化
        2. 从指定小说中检索相关段落
        3. 基于检索结果生成答案
        4. 返回答案和引用来源
        
        注意：
        - 搜索范围可以是单部或多部小说
        - 结果包含原文引用和位置信息
        - 支持历史记录保存
      operationId: search
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
              properties:
                query:
                  type: string
                  minLength: 1
                  maxLength: 500
                  description: 搜索问题或关键词
                  example: "萧炎的师父是谁？"
                novelIds:
                  type: array
                  items:
                    type: string
                  description: |
                    搜索范围（小说 ID 列表）
                    
                    - 不指定：搜索所有小说
                    - 指定多个：在多部小说中搜索
                  example: ["novel_123", "novel_456"]
                topK:
                  type: integer
                  minimum: 1
                  maximum: 20
                  default: 5
                  description: 返回最相关的 K 个结果
                includeReferences:
                  type: boolean
                  default: true
                  description: 是否包含原文引用
                saveHistory:
                  type: boolean
                  default: true
                  description: 是否保存到搜索历史
      responses:
        '200':
          description: 搜索成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  query:
                    type: string
                    description: 原始问题
                    example: "萧炎的师父是谁？"
                  answer:
                    type: string
                    description: 生成的答案
                    example: "萧炎的师父是药尘，原名药尊者，曾是丹塔巨头之一..."
                  confidence:
                    type: number
                    minimum: 0
                    maximum: 1
                    description: 答案置信度
                    example: 0.92
                  references:
                    type: array
                    items:
                      $ref: '#/components/schemas/SearchReference'
                  relatedQuestions:
                    type: array
                    items:
                      type: string
                    description: 相关推荐问题
                    example: ["药尘是如何成为萧炎师父的？", "萧炎还有其他师父吗？"]
                  searchTime:
                    type: number
                    description: 搜索耗时（毫秒）
                    example: 245.6
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /search/history:
    get:
      tags:
        - RAG 搜索
      summary: 获取搜索历史
      description: 获取当前用户的搜索历史记录
      operationId: getSearchHistory
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: novelId
          in: query
          description: 筛选指定小说的搜索历史
          schema:
            type: string
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SearchHistory'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/Unauthorized'

    delete:
      tags:
        - RAG 搜索
      summary: 清空搜索历史
      description: 删除所有搜索历史记录
      operationId: clearSearchHistory
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 清空成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "搜索历史已清空"
        '401':
          $ref: '#/components/responses/Unauthorized'

  /search/history/{historyId}:
    delete:
