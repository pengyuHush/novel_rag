                properties:
                  message:
                    type: string
                    example: "删除成功"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==================== 人物关系图谱 ====================
  /novels/{novelId}/graph:
    get:
      tags:
        - 关系图谱
      summary: 获取人物关系图谱
      description: 获取指定小说的人物关系图谱
      operationId: getCharacterGraph
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/NovelIdParam'
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CharacterGraph'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: 图谱不存在
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: "GRAPH_NOT_FOUND"
                      message:
                        type: string
                        example: "人物关系图谱尚未生成，请先调用生成接口"

    post:
      tags:
        - 关系图谱
      summary: 生成人物关系图谱
      description: |
        为指定小说生成人物关系图谱
        
        处理流程：
        1. 人物实体识别（NER）
        2. 人物出场统计
        3. 关系抽取
        4. 图谱构建
        
        注意：
        - 此操作耗时较长（取决于小说长度）
        - 建议异步调用
        - 如图谱已存在，将重新生成
      operationId: generateCharacterGraph
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/NovelIdParam'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                minAppearances:
                  type: integer
                  minimum: 1
                  default: 5
                  description: 最少出场次数（过滤次要角色）
                maxCharacters:
                  type: integer
                  minimum: 10
                  maximum: 200
                  default: 50
                  description: 最多保留的人物数量
                includeMinorRelationships:
                  type: boolean
                  default: false
                  description: 是否包含次要关系
      responses:
        '202':
          description: 生成任务已启动
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "人物关系图谱生成任务已启动"
                  taskId:
                    type: string
                    description: 任务 ID
                  estimatedTime:
                    type: integer
                    description: 预计耗时（秒）
                    example: 300
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'

    delete:
      tags:
        - 关系图谱
      summary: 删除人物关系图谱
      description: 删除指定小说的人物关系图谱
      operationId: deleteCharacterGraph
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/NovelIdParam'
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "删除成功"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /novels/{novelId}/characters:
    get:
      tags:
